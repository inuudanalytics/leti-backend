basePath: /api/v1
definitions:
  adminModels.Admin:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      password:
        type: string
      password_changed_at:
        type: string
      role:
        $ref: '#/definitions/adminModels.AdminRole'
      updated_at:
        type: string
    type: object
  adminModels.AdminLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  adminModels.AdminRole:
    enum:
    - super_admin
    - admin
    - support
    type: string
    x-enum-varnames:
    - RoleSuperAdmin
    - RoleAdmin
    - RoleSupport
  adminModels.CreateAdminRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        type: string
      role:
        $ref: '#/definitions/adminModels.AdminRole'
    type: object
  adminModels.DashboardStats:
    properties:
      active_users:
        type: integer
      completed_bookings:
        type: integer
      completed_jobs:
        type: integer
      new_users_this_month:
        type: integer
      new_users_this_week:
        type: integer
      new_users_today:
        type: integer
      pending_bookings:
        type: integer
      pending_jobs:
        type: integer
      suspended_users:
        type: integer
      total_artisans:
        type: integer
      total_bookings:
        type: integer
      total_clients:
        type: integer
      total_jobs:
        type: integer
      total_owners:
        type: integer
      total_users:
        type: integer
      total_wallet_volume_ngn:
        type: number
    type: object
  adminModels.PaginatedResponse:
    properties:
      data: {}
      page:
        type: integer
      pages:
        type: integer
      per_page:
        type: integer
      status:
        type: string
      total:
        type: integer
    type: object
  adminModels.PlatformSetting:
    properties:
      description:
        type: string
      key:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      value:
        type: string
    type: object
  adminModels.UpdateAdminPasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  adminModels.UpdateAdminRequest:
    properties:
      full_name:
        type: string
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/adminModels.AdminRole'
    type: object
  adminModels.UpdateSettingRequest:
    properties:
      value:
        type: string
    type: object
  adminModels.UpdateUserStatusRequest:
    properties:
      reason:
        type: string
      status:
        description: approved | suspended | probation | rejected | pending
        type: string
    type: object
  authModels.UpdatePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  authModels.User:
    properties:
      active_role:
        type: string
      apple_sub:
        type: string
      auth_provider:
        type: string
      avatar:
        $ref: '#/definitions/authModels.UserAvatar'
      deleted_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        type: string
      google_sub:
        type: string
      id:
        type: string
      is_online:
        type: boolean
      last_name:
        type: string
      otp:
        type: string
      otp_expires:
        type: string
      password:
        type: string
      password_changed_at:
        type: string
      password_reset_token:
        type: string
      password_token_expires:
        type: string
      phone_number:
        type: string
      phone_verified:
        type: boolean
      recovery_email:
        type: string
      recovery_email_verified:
        type: boolean
      status:
        type: string
      user_created_at:
        type: string
      username:
        type: string
    type: object
  authModels.UserAvatar:
    properties:
      public_id:
        type: string
      url:
        type: string
    type: object
host: leti-backend.onrender.com
info:
  contact: {}
  description: Leti Server REST API
  title: Leti API
  version: "1.0"
paths:
  /admin/admins:
    get:
      description: Returns a paginated list of all admin accounts. Super admin only.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List admins
      tags:
      - Admin Management
    post:
      consumes:
      - application/json
      description: Creates a new admin account. Only super_admin can perform this
        action. Role defaults to support if not provided.
      parameters:
      - description: New admin details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              data:
                properties:
                  email:
                    type: string
                  full_name:
                    type: string
                  id:
                    type: string
                  role:
                    type: string
                type: object
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create admin
      tags:
      - Admin Management
  /admin/admins/{id}:
    patch:
      consumes:
      - application/json
      description: Updates an admin's full_name, role, or is_active status. Super
        admin only.
      parameters:
      - description: Admin UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.UpdateAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update admin
      tags:
      - Admin Management
  /admin/audit-logs:
    get:
      description: Returns a paginated list of admin audit logs. Filterable by admin_id,
        action keyword, and entity_type.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by admin UUID
        in: query
        name: admin_id
        type: string
      - description: Filter by action keyword (partial match)
        in: query
        name: action
        type: string
      - description: Filter by entity type e.g. user, booking, job
        in: query
        name: entity_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - Admin Audit
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates an admin with email and password. Returns a JWT token
        valid for 24 hours.
      parameters:
      - description: Admin credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              admin:
                properties:
                  email:
                    type: string
                  full_name:
                    type: string
                  id:
                    type: string
                  role:
                    type: string
                type: object
              message:
                type: string
              status:
                type: string
              token:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Admin login
      tags:
      - Admin Auth
  /admin/auth/logout:
    post:
      description: Clears the admin Bearer cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Admin logout
      tags:
      - Admin Auth
  /admin/auth/me:
    get:
      description: Returns the profile of the currently authenticated admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/adminModels.Admin'
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current admin
      tags:
      - Admin Auth
  /admin/auth/password:
    patch:
      consumes:
      - application/json
      description: Updates the authenticated admin's password. Requires the current
        password.
      parameters:
      - description: Password update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.UpdateAdminPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update admin password
      tags:
      - Admin Auth
  /admin/auth/refresh:
    post:
      description: Issues a new JWT for an admin using a valid refresh token cookie.
        Rotates the refresh token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
              token:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Refresh admin access token
      tags:
      - Admin Auth
  /admin/dashboard:
    get:
      description: 'Returns aggregate platform statistics: user counts by role, booking
        counts, job counts, wallet volume, and new user trends.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/adminModels.DashboardStats'
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Dashboard stats
      tags:
      - Admin Dashboard
  /admin/dashboard/card:
    get:
      description: 'Returns live card metrics: total users, active artisans online,
        active bookings, total escrow funds held, and open disputes.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  active_artisans:
                    type: integer
                  active_bookings:
                    type: integer
                  total_escrow_funds:
                    type: number
                  total_open_disputes:
                    type: integer
                  total_users:
                    type: integer
                type: object
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Dashboard quick cards
      tags:
      - Admin Dashboard
  /admin/dashboard/jobs-overview:
    get:
      description: Returns job stats (active, completed, cancelled, disputed) and
        a paginated job list. Optionally filter by status.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by job status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              jobs:
                type: object
              stats:
                type: object
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Artisan jobs overview
      tags:
      - Admin Dashboard
  /admin/dashboard/jobs/{id}:
    get:
      description: Returns full detail for a single artisan job including the timeline
        of all events (requests, quotes, disputes).
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  dispute:
                    type: object
                  job:
                    type: object
                  timeline:
                    items:
                      type: object
                    type: array
                type: object
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get job detail
      tags:
      - Admin Dashboard
  /admin/device/tokens:
    post:
      consumes:
      - application/json
      description: Registers a device FCM token for an admin to receive push notifications.
        device_type must be android or ios.
      parameters:
      - description: Device registration payload
        in: body
        name: body
        required: true
        schema:
          properties:
            device_type:
              type: string
            fcm_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register admin device
      tags:
      - Admin Devices
  /admin/jobs:
    get:
      description: Returns a paginated list of artisan jobs. Filterable by status,
        artisan_id, and client_id.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by job status
        in: query
        name: status
        type: string
      - description: Filter by artisan UUID
        in: query
        name: artisan_id
        type: string
      - description: Filter by client UUID
        in: query
        name: client_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List jobs
      tags:
      - Admin Jobs
  /admin/settings:
    get:
      description: Returns all platform configuration settings.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                items:
                  $ref: '#/definitions/adminModels.PlatformSetting'
                type: array
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List platform settings
      tags:
      - Admin Settings
  /admin/settings/{key}:
    patch:
      consumes:
      - application/json
      description: Updates the value of a platform configuration key. Super admin
        only.
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      - description: New value
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.UpdateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update platform setting
      tags:
      - Admin Settings
  /admin/users:
    get:
      description: Returns a paginated list of all users. Supports filtering by active_role,
        status, and a search term that matches first_name, last_name, email, or phone_number.
        Soft-deleted users are excluded.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: per_page
        type: integer
      - description: 'Filter by role: client, artisan, owner'
        in: query
        name: role
        type: string
      - description: 'Filter by status: approved, pending, suspended, probation, rejected'
        in: query
        name: status
        type: string
      - description: Search by first_name, last_name, email, or phone_number
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Admin Users
  /admin/users/{id}:
    delete:
      description: Permanently deletes a user account. This is a hard delete — use
        with caution. Super admin only.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Admin Users
    get:
      description: Returns full profile of a single user including bank details where
        applicable. Role-specific data (artisan services, owner listings) will be
        added as those modules are built.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  user:
                    type: object
                type: object
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Admin Users
  /admin/users/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates a user's account status. Valid values are approved, suspended,
        probation, rejected, pending.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: Status update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.UpdateUserStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user status
      tags:
      - Admin Users
  /admin/withdrawals:
    get:
      description: 'Returns a paginated list of all withdrawals. Optionally filter
        by status: pending, processing, successful, failed.'
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: 'Filter by status: pending, processing, successful, failed'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              data:
                items:
                  type: object
                type: array
              pagination:
                type: object
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List withdrawals
      tags:
      - Admin Finance
  /admin/withdrawals/{id}/verify:
    get:
      description: Checks the live transfer status directly from Paystack for a given
        withdrawal. Automatically syncs the DB status if the webhook was missed.
      parameters:
      - description: Withdrawal UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
