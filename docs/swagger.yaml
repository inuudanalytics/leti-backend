  /bookings:
    get:
      description: Returns a paginated list of bookings. Clients see bookings they
        created; artisans see bookings assigned to them. Optionally filter by status.
      parameters:
      - description: 'Filter: pending|confirmed|declined|cancelled|completed|disputed'
        in: query
        name: status
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              data:
                items:
                  $ref: '#/definitions/booking.Booking'
                type: array
              pagination:
                properties:
                  limit:
                    type: integer
                  page:
                    type: integer
                  total:
                    type: integer
                  total_pages:
                    type: integer
                type: object
              status:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List bookings
      tags:
      - Booking
    post:
      consumes:
      - application/json
      description: Creates a booking request for a specific artisan, date, and time
        slot. The slot must fall within the artisan's active availability window and
        must not already be booked. The booking starts in 'pending' status — the artisan
        must confirm before any payment is collected. Payment method is chosen at
        payment time (POST /bookings/{id}/pay), not here.
      parameters:
      - description: Booking request
        in: body
        name: body
        required: true
        schema:
          properties:
            address:
              type: string
            artisan_id:
              type: string
            booking_date:
              type: string
            category_id:
              type: string
            note:
              type: string
            service_id:
              type: string
            service_option_id:
              type: string
            start_time:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              booking:
                $ref: '#/definitions/booking.Booking'
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Request a booking
      tags:
      - Booking
  /bookings/{id}:
    get:
      description: Returns full detail for a booking. The caller must be the client
        or the artisan on the booking.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                $ref: '#/definitions/booking.Booking'
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a single booking
      tags:
      - Booking
  /bookings/{id}/cancel:
    patch:
      description: Either the client or the artisan can cancel a booking that is pending
        or confirmed. If payment was already made, a refund is triggered separately
        via the escrow/payment service.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cancel a booking
      tags:
      - Booking
  /bookings/{id}/complete:
    patch:
      description: Either the artisan or client can mark a booking as completed.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              booking:
                $ref: '#/definitions/booking.Booking'
              message:
                type: string
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark a booking as completed
      tags:
      - Booking
  /bookings/{id}/confirm:
    patch:
      description: Artisan confirms a pending booking. The booking moves to 'confirmed'
        and the client is notified to complete payment. No money is collected here.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              booking:
                $ref: '#/definitions/booking.Booking'
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Confirm a booking (artisan only)
      tags:
      - Booking
  /bookings/{id}/decline:
    patch:
      description: Artisan declines a pending booking. No payment was collected so
        no refund is needed.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Decline a booking (artisan only)
      tags:
      - Booking
  /bookings/{id}/pay:
    post:
      consumes:
      - application/json
      description: Initiates payment for a booking that has been confirmed by the
        artisan. Supports wallet (instant) and Paystack (redirect). The full amount
        is held in escrow and only released to the artisan after the booking is marked
        completed. Only callable by the client on the booking.
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      - description: 'payment_method: wallet | paystack'
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            payment_method:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              commission:
                type: number
              escrow_id:
                type: string
              message:
                type: string
              payout:
                type: number
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "402":
          description: Payment Required
          schema:
            properties:
              available:
                type: number
              code:
                type: string
              error:
                type: string
              required:
                type: number
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
