host: leti-backend.onrender.com
info:
  contact: {}
  description: Leti Server REST API
  title: Leti API
  version: "1.0"
paths:
  /admin/admins:
    get:
      description: Returns a paginated list of all admin accounts. Super admin only.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List admins
      tags:
      - Admin Management
    post:
      consumes:
      - application/json
      description: Creates a new admin account. Only super_admin can perform this
        action. Role defaults to support if not provided.
      parameters:
      - description: New admin details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              data:
                properties:
                  email:
                    type: string
                  full_name:
                    type: string
                  id:
                    type: string
                  role:
                    type: string
                type: object
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create admin
      tags:
      - Admin Management
  /admin/admins/{id}:
    patch:
      consumes:
      - application/json
      description: Updates an admin's full_name, role, or is_active status. Super
        admin only.
      parameters:
      - description: Admin UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.UpdateAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update admin
      tags:
      - Admin Management
  /admin/audit-logs:
    get:
      description: Returns a paginated list of admin audit logs. Filterable by admin_id,
        action keyword, and entity_type.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by admin UUID
        in: query
        name: admin_id
        type: string
      - description: Filter by action keyword (partial match)
        in: query
        name: action
        type: string
      - description: Filter by entity type e.g. user, booking, job
        in: query
        name: entity_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/adminModels.PaginatedResponse'
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - Admin Audit
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates an admin with email and password. Returns a JWT token
        valid for 24 hours.
      parameters:
      - description: Admin credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminModels.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              admin:
                properties:
                  email:
                    type: string
                  full_name:
                    type: string
                  id:
                    type: string
                  role:
                    type: string
                type: object
              message:
                type: string
              status:
                type: string
              token:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Admin login
      tags:
      - Admin Auth
  /admin/auth/logout:
    post:
      description: Clears the admin Bearer cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Admin logout
      tags:
      - Admin Auth
  /admin/auth/me:
    get:
      description: Returns the profile of the currently authenticated admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
