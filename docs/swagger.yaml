  /auth/signup:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new user account and sends an OTP for verification. Wallet is created automatically on registration. Username is required and must be unique.
        If only email is provided, OTP is sent to email. If only phone_number is provided, OTP is sent to phone.
        If both email and phone_number are provided, a first request (without otp_channel) returns status "choose_channel" — resend the full payload with otp_channel set to either "email" or "phone".
      parameters:
      - description: Registration payload. Provide email, phone_number, or both. If
          both, include otp_channel ('email' or 'phone'). active_role must be client,
          artisan, or owner
        in: body
        name: body
        required: true
        schema:
          properties:
            active_role:
              type: string
            email:
              type: string
            first_name:
              type: string
            last_name:
              type: string
            otp_channel:
              type: string
            password:
              type: string
            phone_number:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: status=choose_channel — returned when both email and phone
            are provided but otp_channel is missing
          schema:
            properties:
              message:
                type: string
              options:
                items:
                  type: string
                type: array
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
