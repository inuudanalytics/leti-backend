  /profile/owner/bank/{id}/primary:
    patch:
      description: Marks a specific bank account as the owner's primary payout account.
        The target account name must match the current primary account name.
      parameters:
      - description: Bank detail UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
