  /properties:
    get:
      description: Returns a paginated list of active properties. Supports rich filtering,
        full-text search, and sorting.
      parameters:
      - description: Filter by state
        in: query
        name: state
        type: string
      - description: Filter by city
        in: query
        name: city
        type: string
      - description: 'Filter by type: apartment, studio, 1_bedroom, etc.'
        in: query
        name: property_type
        type: string
      - description: Minimum price per night
        in: query
        name: min_price
        type: number
      - description: Maximum price per night
        in: query
        name: max_price
        type: number
      - description: Minimum average rating (0–5)
        in: query
        name: min_rating
        type: number
      - description: Maximum average rating
        in: query
        name: max_rating
        type: number
      - description: Minimum review count
        in: query
        name: min_reviews
        type: integer
      - description: Comma-separated list of required amenities e.g. WiFi,AC
        in: query
        name: amenities
        type: string
      - description: Minimum adult capacity
        in: query
        name: min_adults
        type: integer
      - description: Minimum children capacity
        in: query
        name: min_children
        type: integer
      - description: Check-in date YYYY-MM-DD — filters to available properties
        in: query
        name: checkin
        type: string
      - description: Check-out date YYYY-MM-DD — filters to available properties
        in: query
        name: checkout
        type: string
      - description: Full-text search on name, description, city, street
        in: query
        name: search
        type: string
      - description: 'Sort field: price_asc, price_desc, rating_desc, newest (default:
          newest)'
        in: query
        name: sort
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyListResponse'
      summary: List / search properties
      tags:
      - Properties
    post:
      consumes:
      - multipart/form-data
      description: Allows an authenticated owner to create a new shortlet property
        listing. Images are uploaded via multipart form. Up to 5 images are accepted.
        The listing starts as 'active' by default.
      parameters:
      - description: Property name
        in: formData
        name: name
        required: true
        type: string
      - description: Property description
        in: formData
        name: description
        type: string
      - description: 'One of: apartment, studio, 1_bedroom, 2_bedroom, 3_bedroom,
          4_bedroom, 5_bedroom_plus, duplex, penthouse, villa, bungalow'
        in: formData
        name: property_type
        required: true
        type: string
      - description: Nightly rate in NGN
        in: formData
        name: price_per_night
        required: true
        type: number
      - description: Refundable caution fee in NGN (default 0)
        in: formData
        name: caution_fee
        type: number
      - description: JSON array string e.g. [\
        in: formData
        name: amenities
        type: string
      - description: JSON array string e.g. [\
        in: formData
        name: house_rules
        type: string
      - description: Max number of adult guests
        in: formData
        name: max_adults
        required: true
        type: integer
      - description: Max number of children (default 0)
        in: formData
        name: max_children
        type: integer
      - description: Nigerian state
        in: formData
        name: state
        required: true
        type: string
      - description: City
        in: formData
        name: city
        required: true
        type: string
      - description: Street address
        in: formData
        name: street
        required: true
        type: string
      - description: Latitude coordinate
        in: formData
        name: latitude
        type: number
      - description: Longitude coordinate
        in: formData
        name: longitude
        type: number
      - description: Property images (max 5)
        in: formData
        name: images
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/shortlet.PropertyResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a property listing
      tags:
      - Properties
  /properties/{id}:
    delete:
      description: Soft-deletes a property. Only the owner can delete it. Properties
        with active confirmed orders cannot be deleted.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a property listing
      tags:
      - Properties
    get:
      description: Returns full details of a property, including its review summary.
        Clients can access active listings; owners can access their own regardless
        of status.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyDetailResponse'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a single property
      tags:
      - Properties
    patch:
      consumes:
      - multipart/form-data
      description: Allows the owner to update any field of their property listing.
        Send only the fields you want to change. Images that are not re-uploaded remain
        unchanged. Sending new images replaces all existing ones (max 5 total).
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Property name
        in: formData
        name: name
        type: string
      - description: Property description
        in: formData
        name: description
        type: string
      - description: Property type
        in: formData
        name: property_type
        type: string
      - description: Nightly rate in NGN
        in: formData
        name: price_per_night
        type: number
      - description: Caution fee in NGN
        in: formData
        name: caution_fee
        type: number
      - description: JSON array of amenity strings
        in: formData
        name: amenities
        type: string
      - description: JSON array of rule strings
        in: formData
        name: house_rules
        type: string
      - description: Max adults
        in: formData
        name: max_adults
        type: integer
      - description: Max children
        in: formData
        name: max_children
        type: integer
      - description: State
        in: formData
        name: state
        type: string
      - description: City
        in: formData
        name: city
        type: string
      - description: Street
        in: formData
        name: street
        type: string
      - description: Latitude
        in: formData
        name: latitude
        type: number
      - description: Longitude
        in: formData
        name: longitude
        type: number
      - description: active or inactive
        in: formData
        name: status
        type: string
      - description: New images (replaces all existing, max 5)
        in: formData
        name: images
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a property listing
      tags:
      - Properties
  /properties/{id}/availability:
    post:
      consumes:
      - application/json
      description: Creates or updates an availability date range for the property.
        Multiple non-overlapping windows are allowed (e.g. different months). If a
        range with the same from/to already exists it is updated in place.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Dates in YYYY-MM-DD, times in HH:MM (default 14:00 / 11:00)
        in: body
        name: body
        required: true
        schema:
          properties:
            available_from:
              type: string
            available_to:
              type: string
            check_in_time:
              type: string
            check_out_time:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyAvailabilityResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set availability window for a property
      tags:
      - Properties / Availability
  /properties/{id}/availability/{avail_id}:
    delete:
      description: Deactivates an availability window. Does not affect existing confirmed
        orders.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Availability UUID
        in: path
        name: avail_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove an availability window
      tags:
      - Properties / Availability
  /properties/{id}/availability/block:
    post:
      consumes:
      - application/json
      description: Adds a date-level override that makes a day unavailable (e.g. personal
        use, maintenance). Cannot block a date that has a confirmed booking.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: date in YYYY-MM-DD
        in: body
        name: body
        required: true
        schema:
          properties:
            date:
              type: string
            reason:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyAvailabilityOverrideResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Block a specific date
      tags:
      - Properties / Availability
  /properties/{id}/availability/block/{date}:
    delete:
      description: Removes a previously blocked date override, making the day available
        again (subject to the active availability windows).
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Date in YYYY-MM-DD
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Unblock a specific date
      tags:
      - Properties / Availability
  /properties/{id}/calendar:
    get:
      description: Returns a day-by-day availability breakdown for a property over
        a date range (max 90 days). Each day indicates whether it is available, blocked
        by the owner, or already booked. Designed to power a calendar/date-picker
        UI.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Start date YYYY-MM-DD (inclusive)
        in: query
        name: from
        required: true
        type: string
      - description: End date YYYY-MM-DD (inclusive, max 90 days from from)
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyCalendarResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get property calendar
      tags:
      - Properties / Availability
  /properties/{id}/reviews:
    get:
      description: Returns a paginated list of reviews for a property, including any
        replies. Also returns the aggregate rating summary (avg, count, breakdown
        by star).
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/shortlet.PropertyReviewListResponse'
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Get reviews for a property
      tags:
      - Reviews
  /properties/{id}/save:
    post:
      description: Toggles the saved/bookmark status for a property. If not saved,
        it saves it. If already saved, it removes it. Only clients can save listings.
      parameters:
      - description: Property UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              message:
                type: string
              saved:
                type: boolean
              status:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Save or unsave a property
      tags:
      - Saved Listings
  /reviews/{id}/reply:
    post:
      consumes:
      - application/json
      description: Allows the review author (client) or the property owner to reply
        to a review once each. Each party may only reply once. To reply as an owner,
        you must be the owner of the property being reviewed.
      parameters:
      - description: Review UUID
        in: path
        name: id
        required: true
        type: string
      - description: Reply text
        in: body
        name: body
        required: true
        schema:
          properties:
            body:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/shortlet.PropertyReviewReplyResponse'
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "403":
          description: Forbidden
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reply to a property review
      tags:
      - Reviews
  /wallet/fund:
    post:
      consumes:
      - application/json
      description: Initialises a Paystack payment to top up the authenticated user's
        wallet. Returns a Paystack checkout URL. The wallet is credited automatically
        once the webhook confirms payment.
      parameters:
      - description: amount in Naira (min 100); email only required if account has
          none
        in: body
        name: body
        required: true
        schema:
          properties:
            amount:
              type: number
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  authorization_url:
                    type: string
                  reference:
                    type: string
                type: object
              message:
                type: string
              status:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Fund wallet via Paystack
      tags:
      - Wallet
  /wallet/verify:
    get:
      description: 'Verifies the status of a Paystack payment by reference. Used as
        the redirect callback after Paystack checkout. Note: wallet crediting is handled
        by the webhook — this endpoint is informational only.'
      parameters:
      - description: Paystack payment reference
        in: query
        name: reference
        type: string
      - description: Paystack trxref (alias)
        in: query
        name: trxref
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              amount:
                type: number
              message:
                type: string
              reference:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              amount:
                type: number
              message:
                type: string
              reference:
                type: string
              status:
                type: string
            type: object
      summary: Verify a Paystack payment (frontend callback)
      tags:
      - Wallet
  /wallet/withdraw:
    post:
      consumes:
      - application/json
      description: Initiates a direct Paystack transfer to the user's primary bank
        account. A ₦50 processing fee is deducted. The wallet is debited immediately;
        funds arrive once Paystack confirms the transfer. Requires a primary bank
        account to be set up first.
      parameters:
      - description: Amount in Naira (min ₦100)
        in: body
        name: body
        required: true
        schema:
          properties:
            amount:
              type: number
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                properties:
                  account_number:
                    type: string
                  amount:
                    type: number
                  bank_name:
                    type: string
                  fee:
                    type: number
                  status:
                    type: string
                  withdrawal_id:
                    type: string
                type: object
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "409":
          description: Conflict
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Withdraw funds from wallet
      tags:
      - Wallet
  /wallet/withdrawals:
    get:
      description: Returns a paginated list of the authenticated user's past withdrawals.
      parameters:
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              count:
                type: integer
              data:
                items:
                  type: object
                type: array
              pagination:
                type: object
              status:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get withdrawal history
      tags:
      - Wallet
schemes:
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
